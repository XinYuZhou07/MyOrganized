<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyOrganized-planner</title>

    <!-- Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../CSS/fontSettings.css">
    <link rel="stylesheet" href="../CSS/interCSS.css">
    <link rel="stylesheet" href="../CSS/detailedCSS.css">
    <link rel="stylesheet" href="../CSS/planner.css">
    <link rel="stylesheet" href="../CSS/calendario.css">

    <style>
        
    </style>
</head>

<body>

    <!-- Input hidden richiesto da calendario.js — non visibile all'utente -->
    <input type="hidden" id="data_evento_input">

    <!-- NAVBAR -->
    <div class="navBar">
        <div class="navBar-L">
            <span class="navBar-Brand">MyOrganized</span>
            <div class="navBar-Link">
                <a href="./home.html">Panoramica</a>
                <a href="./store.html">Store</a>
                <a href="#" class="Active">Planner</a>
            </div>
        </div>
        <div class="navBar-R">
            <span class="navBar-UsrName">John Appleseed</span>
            <img class="navBar-Avatar" src="./img/defaultProfile.jpg" alt="">
        </div>
    </div>

    <!-- PAGINA -->
    <div class="mainView">
        <div class="mainLayout plannerLayout">

            <!--       COLONNA SINISTRA    -->
            <div class="rightColumn">

                <p class="superTitle">Planner</p>
                <p class="subTitle">Preparati per nuovi eventi.</p>

                <!-- Calendario -->
                <div class="block planner-calendar-block">
                    <div class="metaTag">Calendario</div>
                    <div style="display:flex; align-items:center; gap:10px; margin-top:4px;">
                        <i class="bi bi-calendar3" style="font-size:26px; color:#555;"></i>
                        <div class="cal-month-row">
                            <button class="cal-month-btn" id="month-btn">
                                <div class="elementTitle" id="month-label">Novembre 2025</div>
                                <i class="bi bi-caret-down-fill cal-caret" id="cal-caret"></i>
                            </button>
                            <div class="cal-dropdown" id="cal-dropdown">
                                <div class="cal-dd-year-row">
                                    <button class="cal-dd-year-btn" id="yr-prev">&#8592;</button>
                                    <span class="cal-dd-year-val" id="dd-year-val"></span>
                                    <button class="cal-dd-year-btn" id="yr-next">&#8594;</button>
                                </div>
                                <div class="cal-dd-months" id="dd-months"></div>
                            </div>
                        </div>
                    </div>

                    <hr style="margin: 14px 0; opacity: 0.2;">

                    <div class="calendar" id="cal-grid"></div>
                </div>

                <!-- AI Suggestion -->
                <div class="planner-ai">
                    <div class="planner-ai-icon"><i class="bi bi-info-circle"></i></div>
                    <div>
                        <div class="planner-ai-title">Suggerimenti dall'IA</div>
                        <div class="planner-ai-text">
                            Lasciati ispirare dai suggerimenti basati sulla tua routine.
                        </div>
                        <div class="planner-ai-status">Attendo l'IA...</div>
                    </div>
                </div>
            </div>

            <!--        COLONNA DESTRA     -->

            <div class="leftColumn">
                <div class="block planner-right-block">

                    <div class="planner-day-header">
                        <div class="planner-day-left">
                            <div id="planner-day-number" class="planner-day-number">—</div>
                            <div class="planner-day-meta">
                                <div id="planner-day-weekday" class="planner-day-weekday">—</div>
                                <div id="planner-day-month" class="planner-day-month">—</div>
                            </div>
                        </div>
                        <a id="new-event-btn" href="./php/planner_newEvent.php">
                            <button class="planner-new-event">+ Nuovo Evento</button>
                        </a>
                    </div>

                    <div class="planner-day-divider"></div>

                    <div id="planner-events-list" class="planner-events-list">
                        <div class="ec-empty">
                            <div class="ec-empty-icon"><i class="bi bi-calendar3"></i></div>
                            <div class="ec-empty-text">Seleziona un giorno nel calendario.</div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="../JS/calendario.js"></script>

    <script src="../JS/planner.js"></script>

</body>
</html>
